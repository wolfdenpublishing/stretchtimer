<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stretch Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1923;
    --card: #172a3a;
    --card-border: #1e3a4f;
    --accent: #3ecfb4;
    --accent-glow: rgba(62, 207, 180, 0.15);
    --text: #e8f0f2;
    --text-dim: #7a9bae;
    --warning: #f0a050;
    --done: #50d890;
    --ring-track: #1e3a4f;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }

  .app {
    width: 420px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .progress-track {
    width: 100%;
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
  }
  .progress-pip {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--ring-track);
    transition: background 0.4s ease;
  }
  .progress-pip.done { background: var(--accent); }
  .progress-pip.active { background: var(--warning); }

  .pose-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px 20px 16px;
    width: 100%;
    text-align: center;
    position: relative;
    margin-bottom: 24px;
  }
  .pose-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pose-name {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .pose-subtitle {
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    min-height: 1.3em;
  }

  .pose-illustration {
    width: 150px;
    height: 140px;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    overflow: hidden;
  }
  .pose-illustration .pose-sprite {
    width: 100%;
    height: 100%;
    background-image: url('poses.jpg');
    background-repeat: no-repeat;
  }

  .timer-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 24px;
  }
  .timer-ring {
    transform: rotate(-90deg);
    width: 200px;
    height: 200px;
  }
  .timer-ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }
  .timer-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s ease;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }
  .timer-ring-fill.warning {
    stroke: var(--warning);
  }
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .timer-seconds {
    font-family: 'Space Mono', monospace;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
  }
  .timer-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    padding: 16px 40px;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
    width: 100%;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(62, 207, 180, 0.25);
  }
  .btn-start:hover { box-shadow: 0 4px 30px rgba(62, 207, 180, 0.4); }

  .btn-pause {
    background: var(--card);
    color: var(--text);
    box-shadow: none;
    width: 100%;
    max-width: 280px;
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 100%;
    margin-top: 16px;
  }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text-dim);
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .nav-btn.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .nav-icon {
    font-size: 1rem;
    line-height: 1;
  }

  .completed {
    text-align: center;
    padding: 40px 20px;
  }
  .completed h2 {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .completed p {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 24px;
  }
  .completed .total-time {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .intro {
    text-align: center;
    padding-top: 20px;
  }
  .intro h2 {
    font-size: 1.3rem;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .intro p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .pose-list {
    text-align: left;
    width: 100%;
    margin-bottom: 28px;
  }
  .pose-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 0.95rem;
  }
  .pose-list-item:last-child { border-bottom: none; }
  .pose-list-time {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
  }
  .pose-list-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mult-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 0;
  }
  .mult-btn:active { transform: scale(0.9); }
  .mult-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .mult-btn.disabled { opacity: 0.3; pointer-events: none; }
  .mult-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    min-width: 30px;
    text-align: center;
  }
  .pose-multiplier {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .pose-multiplier .mult-label {
    font-size: 0.8rem;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
const poseImages = {
  cat: "0px -141px",
  cow: "-150px -141px",
  oldd: "-300px -141px",
  camel: "0px -281px",
  forward: "-150px -281px",
  child: "-300px -281px",
  seated: "0px -422px",
  updog: "-150px -422px",
  downdog: "-300px -422px"
};

const poses = [
  { name: "Cat Pose", duration: 45, subtitle: "", key: "cat" },
  { name: "Cow Pose", duration: 45, subtitle: "", key: "cow" },
  { name: "One Legged Downward Dog", duration: 45, subtitle: "Right Leg", key: "oldd" },
  { name: "One Legged Downward Dog", duration: 45, subtitle: "Left Leg", key: "oldd" },
  { name: "Camel Pose", duration: 30, subtitle: "", key: "camel" },
  { name: "Forward Bend", duration: 30, subtitle: "", key: "forward" },
  { name: "Child Pose", duration: 30, subtitle: "", key: "child" },
  { name: "Seated Forward Bend", duration: 30, subtitle: "", key: "seated" },
  { name: "Upward Facing Dog", duration: 45, subtitle: "", key: "updog" },
  { name: "Downward Dog", duration: 30, subtitle: "", key: "downdog" },
];

// Multiplier helpers
function getPoseId(pose) {
  return pose.key + (pose.subtitle ? '-' + pose.subtitle : '');
}

function loadMultipliers() {
  try { return JSON.parse(localStorage.getItem('stretchTimerMultipliers')) || {}; } catch { return {}; }
}

function getMultiplier(pose) {
  return loadMultipliers()[getPoseId(pose)] || 1.0;
}

function setMultiplier(pose, value) {
  value = Math.max(0.5, Math.round(value * 10) / 10);
  const m = loadMultipliers();
  m[getPoseId(pose)] = value;
  localStorage.setItem('stretchTimerMultipliers', JSON.stringify(m));
}

function getEffectiveDuration(pose) {
  return Math.round(pose.duration * getMultiplier(pose));
}

function getTotalTime() {
  return poses.reduce((s, p) => s + getEffectiveDuration(p), 0);
}

function adjustMultiplier(poseIndex, delta) {
  const pose = poses[poseIndex];
  const current = getMultiplier(pose);
  setMultiplier(pose, current + delta);
  if (currentPose === -1) {
    renderIntro();
  } else {
    renderPose();
  }
}

function formatTime(seconds) {
  return Math.floor(seconds / 60) + ':' + (seconds % 60).toString().padStart(2, '0');
}

// Audio
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDing() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.8);
}

function playTick() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

// State
let currentPose = -1;
let timeRemaining = 0;
let timerInterval = null;
let running = false;
let countingDown = false;
let paused = false;

const app = document.getElementById('app');
const CIRCUMFERENCE = 2 * Math.PI * 88;

function renderIntro() {
  const total = getTotalTime();
  let listHTML = poses.map((p, i) => {
    const mult = getMultiplier(p);
    const eff = getEffectiveDuration(p);
    return `
    <div class="pose-list-item">
      <span>${p.name}${p.subtitle ? ' (' + p.subtitle + ')' : ''}</span>
      <div class="pose-list-right">
        <button class="mult-btn ${mult <= 0.5 ? 'disabled' : ''}" onclick="adjustMultiplier(${i}, -0.1)">&minus;</button>
        <span class="mult-value">&times;${mult.toFixed(1)}</span>
        <button class="mult-btn" onclick="adjustMultiplier(${i}, 0.1)">+</button>
        <span class="pose-list-time">${eff}s</span>
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="intro">
      <h2>Daily Flexibility Routine</h2>
      <p>${poses.length} poses &middot; ${formatTime(total)} total</p>
      <div class="pose-list">${listHTML}</div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="startRoutine()">Begin Routine</button>
      </div>
    </div>
  `;
  scaleApp();
}

function renderPose() {
  const pose = poses[currentPose];
  const mult = getMultiplier(pose);
  const effDuration = getEffectiveDuration(pose);
  const pipsHTML = poses.map((_, i) => {
    let cls = 'progress-pip';
    if (i < currentPose) cls += ' done';
    else if (i === currentPose) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let ringTotal, isWarning, timerLabel;
  if (countingDown) {
    ringTotal = 5;
    isWarning = true;
    timerLabel = 'get ready';
  } else {
    ringTotal = effDuration;
    isWarning = timeRemaining <= 5 && timeRemaining > 0 && running;
    timerLabel = running ? 'seconds' : (timeRemaining === 0 ? 'done!' : 'ready');
  }
  const offset = CIRCUMFERENCE - (CIRCUMFERENCE * (timeRemaining / ringTotal));

  const showMultControls = !running && !countingDown;

  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="progress-track">${pipsHTML}</div>
    <div class="pose-card">
      <div class="pose-label">Pose ${currentPose + 1} of ${poses.length}</div>
      <div class="pose-name">${pose.name}</div>
      <div class="pose-subtitle">${pose.subtitle || ''}</div>
      <div class="pose-illustration">
        <div class="pose-sprite" style="background-position: ${poseImages[pose.key]};background-size: 450px auto;" role="img" aria-label="${pose.name}"></div>
      </div>
      ${showMultControls ? `
      <div class="pose-multiplier">
        <button class="mult-btn ${mult <= 0.5 ? 'disabled' : ''}" onclick="adjustMultiplier(${currentPose}, -0.1)">&minus;</button>
        <span class="mult-label">&times;${mult.toFixed(1)} &middot; ${effDuration}s</span>
        <button class="mult-btn" onclick="adjustMultiplier(${currentPose}, 0.1)">+</button>
      </div>` : ''}
    </div>
    <div class="timer-container">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="timer-ring-track" cx="100" cy="100" r="88"/>
        <circle class="timer-ring-fill ${isWarning ? 'warning' : ''}" cx="100" cy="100" r="88"
          stroke-dasharray="${CIRCUMFERENCE}"
          stroke-dashoffset="${offset}"/>
      </svg>
      <div class="timer-display">
        <div class="timer-seconds">${timeRemaining}</div>
        <div class="timer-label">${timerLabel}</div>
      </div>
    </div>
    <div class="btn-row">
      ${!running && !countingDown && timeRemaining > 0
        ? (paused
          ? `<button class="btn btn-start" onclick="resumeTimer()">Resume</button>`
          : `<button class="btn btn-start" onclick="startTimer()">Start</button>`)
        : running || countingDown
          ? `<button class="btn btn-pause" onclick="pauseTimer()">Pause</button>`
          : `<button class="btn btn-start" onclick="nextPose()">Next Pose</button>`
      }
    </div>
    <div class="nav-bar">
      <button class="nav-btn ${currentPose === 0 ? 'disabled' : ''}" onclick="prevPose()"><span class="nav-icon">&#9664;</span> Prev</button>
      <button class="nav-btn" onclick="resetApp()"><span class="nav-icon">&#8962;</span> Home</button>
      <button class="nav-btn" onclick="redoPose()"><span class="nav-icon">&#8635;</span> Redo</button>
      <button class="nav-btn" onclick="nextPose()">Skip <span class="nav-icon">&#9654;</span></button>
    </div>
  `;
  scaleApp();
}

function renderComplete() {
  const total = getTotalTime();
  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="progress-track">${poses.map(() => '<div class="progress-pip done"></div>').join('')}</div>
    <div class="completed">
      <div class="total-time">${formatTime(total)}</div>
      <h2>All Done!</h2>
      <p>Great work finishing your flexibility routine.</p>
      <button class="btn btn-start" onclick="resetApp()">Do It Again</button>
    </div>
  `;
  scaleApp();
}

function startRoutine() {
  ensureAudio();
  currentPose = 0;
  countingDown = false;
  paused = false;
  timeRemaining = getEffectiveDuration(poses[0]);
  running = false;
  renderPose();
}

function startTimer() {
  ensureAudio();
  countingDown = true;
  paused = false;
  running = true;
  timeRemaining = 5;
  renderPose();
  timerInterval = setInterval(countdownTick, 1000);
}

function countdownTick() {
  timeRemaining--;
  if (timeRemaining > 0) {
    playTick();
    renderPose();
  } else {
    clearInterval(timerInterval);
    playDing();
    countingDown = false;
    timeRemaining = getEffectiveDuration(poses[currentPose]);
    renderPose();
    timerInterval = setInterval(poseTimerTick, 1000);
  }
}

function poseTimerTick() {
  timeRemaining--;
  if (timeRemaining <= 5 && timeRemaining > 0) playTick();
  if (timeRemaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    running = false;
    playDing();
    renderPose();
  } else {
    renderPose();
  }
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  paused = true;
  renderPose();
}

function resumeTimer() {
  ensureAudio();
  running = true;
  paused = false;
  renderPose();
  timerInterval = setInterval(countingDown ? countdownTick : poseTimerTick, 1000);
}

function nextPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  currentPose++;
  if (currentPose >= poses.length) {
    renderComplete();
  } else {
    timeRemaining = getEffectiveDuration(poses[currentPose]);
    renderPose();
  }
}

function prevPose() {
  if (currentPose <= 0) return;
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  currentPose--;
  timeRemaining = getEffectiveDuration(poses[currentPose]);
  renderPose();
}

function redoPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  timeRemaining = getEffectiveDuration(poses[currentPose]);
  renderPose();
}

function resetApp() {
  currentPose = -1;
  timeRemaining = 0;
  running = false;
  countingDown = false;
  paused = false;
  clearInterval(timerInterval);
  renderIntro();
}

function scaleApp() {
  app.style.transform = 'none';
  const appW = app.offsetWidth;
  const appH = app.scrollHeight;
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  const scale = Math.min(winW / appW, winH / appH);
  app.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', scaleApp);

renderIntro();
</script>
</body>
</html>
