<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rise &amp; Stretch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1923;
    --card: #172a3a;
    --card-border: #1e3a4f;
    --accent: #3ecfb4;
    --accent-glow: rgba(62, 207, 180, 0.15);
    --text: #e8f0f2;
    --text-dim: #7a9bae;
    --warning: #f0a050;
    --done: #50d890;
    --ring-track: #1e3a4f;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
  }

  .app {
    width: 420px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: top center;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .progress-track {
    width: 100%;
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
  }
  .progress-pip {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--ring-track);
    transition: background 0.4s ease;
  }
  .progress-pip.done { background: var(--accent); }
  .progress-pip.active { background: var(--warning); }

  .pose-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px 20px 16px;
    width: 100%;
    text-align: center;
    position: relative;
    margin-bottom: 24px;
  }
  .pose-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pose-name {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .pose-subtitle {
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    min-height: 1.3em;
  }

  .pose-illustration {
    width: 150px;
    height: 150px;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    overflow: hidden;
  }
  .pose-illustration img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .timer-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 24px;
  }
  .timer-ring {
    transform: rotate(-90deg);
    width: 200px;
    height: 200px;
  }
  .timer-ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }
  .timer-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s ease;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }
  .timer-ring-fill.warning {
    stroke: var(--warning);
  }
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .timer-seconds {
    font-family: 'Space Mono', monospace;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
  }
  .timer-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    padding: 16px 40px;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
    width: 100%;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(62, 207, 180, 0.25);
  }
  .btn-start:hover { box-shadow: 0 4px 30px rgba(62, 207, 180, 0.4); }

  .btn-pause {
    background: var(--card);
    color: var(--text);
    box-shadow: none;
    width: 100%;
    max-width: 280px;
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 100%;
    margin-top: 16px;
  }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text-dim);
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .nav-btn.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .nav-icon {
    font-size: 1rem;
    line-height: 1;
  }

  .completed {
    text-align: center;
    padding: 40px 20px;
  }
  .completed h2 {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .completed p {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 24px;
  }
  .completed .total-time {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .intro {
    text-align: center;
    padding-top: 20px;
  }
  .intro h2 {
    font-size: 1.3rem;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .intro p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .pose-list {
    text-align: left;
    width: 100%;
    margin-bottom: 28px;
  }
  .pose-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 0.95rem;
  }
  .pose-list-item:last-child { border-bottom: none; }
  .pose-list-time {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
  }
  .pose-list-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mult-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 0;
  }
  .mult-btn:active { transform: scale(0.9); }
  .mult-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .mult-btn.disabled { opacity: 0.3; pointer-events: none; }
  .mult-value {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    min-width: 30px;
    text-align: center;
  }
  .pose-multiplier {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .pose-multiplier .mult-label {
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .pose-hint {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 16px;
    padding: 0 12px;
  }
  .pose-hint strong {
    color: var(--text);
  }

  .landing {
    text-align: center;
    padding-top: 24px;
    width: 100%;
  }
  .landing h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .landing .tagline {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-style: italic;
  }
  .landing-image-container {
    width: 180px;
    height: 180px;
    margin: 0 auto 28px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .landing-image-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
    position: absolute;
  }
  .landing-image-container img.fade-out {
    opacity: 0;
  }
  .landing-image-container img.fade-in {
    opacity: 1;
  }
  .landing-description {
    text-align: left;
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .landing-description p {
    margin-bottom: 12px;
  }
  .landing-description strong {
    color: var(--text);
  }

  .disclaimer {
    text-align: center;
    padding-top: 32px;
    width: 100%;
  }
  .disclaimer h2 {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--warning);
    margin-bottom: 24px;
  }
  .disclaimer-text {
    text-align: left;
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .disclaimer-text p {
    margin-bottom: 12px;
  }
  .disclaimer-note {
    font-size: 0.65rem;
    color: var(--text-dim);
    opacity: 0.6;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// Pose data (master copy in poses.json)
const poses = [
  { "name": "Cat Pose",             "duration": 45, "image": "poses/cat_pose.png" },
  { "name": "Cow Pose",             "duration": 45, "image": "poses/cow_pose.png" },
  { "name": "Downward Dog",         "duration": 30, "image": "poses/downward_dog.png" },
  { "name": "One Leg Downward Dog", "duration": 30, "image": "poses/one_legged_downward_dog_r.png", "side": "Right" },
  { "name": "One Leg Downward Dog", "duration": 30, "image": "poses/one_legged_downward_dog_l.png", "side": "Left" },
  { "name": "Upward Dog",           "duration": 30, "image": "poses/upward_dog.png" },
  { "name": "Child Pose",           "duration": 45, "image": "poses/child_pose.png" },
  { "name": "Camel Pose",           "duration": 45, "image": "poses/camel_pose.png" },
  { "name": "Pigeon Pose",          "duration": 30, "image": "poses/pigeon_pose_r.png", "side": "Right" },
  { "name": "Pigeon Pose",          "duration": 30, "image": "poses/pigeon_pose_l.png", "side": "Left" },
  { "name": "Warrior I",            "duration": 30, "image": "poses/warrior_i_r.png", "side": "Right" },
  { "name": "Warrior I",            "duration": 30, "image": "poses/warrior_i_l.png", "side": "Left" },
  { "name": "Forward Bend",         "duration": 45, "image": "poses/forward_bend.png" },
  { "name": "Triangle",             "duration": 30, "image": "poses/triangle_r.png", "side": "Right" },
  { "name": "Triangle",             "duration": 30, "image": "poses/triangle_l.png", "side": "Left" },
  { "name": "Caterpillar Pose",     "duration": 45, "image": "poses/caterpillar_pose.png" }
];

const hints = [
  "<strong>Breathe Deeply.</strong> Focus on slow, steady breathing through each pose. Never hold your breath.",
  "<strong>Breathe Through Discomfort.</strong> When a stretch feels intense, breathe slowly into it rather than tensing up.",
  "<strong>Try Box Breathing.</strong> Inhale for 4 counts, hold for 4, exhale for 4, hold for 4. It helps you settle into each pose.",
  "<strong>Don't Force It.</strong> Flexibility comes with time. Never force your body into painful positions.",
  "<strong>Listen to Your Body.</strong> Sharp or shooting pain means stop. A mild stretching sensation is normal.",
  "<strong>Hold, Don't Bounce.</strong> Static holds are safer and more effective than bouncing in and out of a stretch.",
  "<strong>Focus on Form.</strong> A smaller, well-aligned stretch is better than forcing deeper with poor form.",
  "<strong>Modify When Needed.</strong> There is no shame in modifying a pose. Reduce range of motion as needed.",
  "<strong>Don't Be Discouraged.</strong> Initial stiffness and discomfort is normal when starting out. It gets easier.",
  "<strong>Consistency Over Intensity.</strong> A gentle daily routine beats an occasional intense one every time.",
  "<strong>Progress Takes Time.</strong> Noticeable flexibility improvements typically come after 2\u20134 weeks of daily practice.",
  "<strong>Celebrate Small Wins.</strong> Holding a pose longer or reaching a little further are real achievements.",
  "<strong>Rest Days Are OK.</strong> If you're very sore, take a day off or reduce your multipliers for a lighter session.",
  "<strong>Relax Into It.</strong> Tension works against stretching. Consciously relax your muscles while holding each pose.",
  "<strong>Engage Your Core.</strong> A gently engaged core protects your lower back in most poses.",
  "<strong>Relax Your Shoulders.</strong> Tension often creeps into the shoulders. Consciously drop them away from your ears.",
  "<strong>Keep a Soft Gaze.</strong> Fixing your eyes on a still point helps with balance and focus during standing poses.",
  "<strong>Ground Through Your Hands.</strong> In poses on all fours, spread your fingers wide and press evenly through your palms.",
  "<strong>Morning Stiffness Is Normal.</strong> Your body will be tighter in the morning. Be patient and ease into each pose.",
  "<strong>Stay Hydrated.</strong> Drink water before and after your routine. Hydrated muscles stretch more easily.",
  "<strong>Empty Stomach Helps.</strong> Yoga stretches are most comfortable on an empty or light stomach.",
  "<strong>Use a Mat.</strong> A yoga mat provides cushioning for your knees and grip for your hands and feet.",
  "<strong>Cool Down Matters.</strong> The final poses are designed to cool you down. Don't skip them.",
  "<strong>Track Your Progress.</strong> Use the level multipliers to gradually increase hold times as you get stronger."
];

let routineHints = [];

function shuffleHints() {
  const shuffled = [...hints];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  routineHints = shuffled.slice(0, poses.length);
}

// Multiplier helpers
function getPoseId(pose) {
  return pose.name + (pose.side ? '-' + pose.side : '');
}

function loadMultipliers() {
  try { return JSON.parse(localStorage.getItem('stretchTimerMultipliers')) || {}; } catch { return {}; }
}

function getMultiplier(pose) {
  return loadMultipliers()[getPoseId(pose)] || 1.0;
}

function setMultiplier(pose, value) {
  value = Math.max(0.5, Math.round(value * 10) / 10);
  const m = loadMultipliers();
  m[getPoseId(pose)] = value;
  localStorage.setItem('stretchTimerMultipliers', JSON.stringify(m));
}

function getEffectiveDuration(pose) {
  return Math.round(pose.duration * getMultiplier(pose));
}

function getTotalTime() {
  return poses.reduce((s, p) => s + getEffectiveDuration(p), 0);
}

function adjustMultiplier(poseIndex, delta) {
  const pose = poses[poseIndex];
  const current = getMultiplier(pose);
  setMultiplier(pose, current + delta);
  if (currentPose === -1) {
    renderIntro();
  } else {
    renderPose();
  }
}

function formatTime(seconds) {
  return Math.floor(seconds / 60) + ':' + (seconds % 60).toString().padStart(2, '0');
}

// Audio
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDing() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.8);
}

function playTick() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

// State
let currentPose = -1;
let timeRemaining = 0;
let timerInterval = null;
let running = false;
let countingDown = false;
let paused = false;

const app = document.getElementById('app');
const CIRCUMFERENCE = 2 * Math.PI * 88;
let landingImageInterval = null;

function renderLanding() {
  if (landingImageInterval) clearInterval(landingImageInterval);

  app.innerHTML = `
    <div class="landing">
      <h1>Rise &amp; Stretch</h1>
      <div class="tagline">Yoga Stretches for Strength &amp; Flexibility</div>
      <div class="landing-image-container">
        <img id="landing-img" class="fade-in" src="${poses[0].image}" alt="Yoga pose">
      </div>
      <div class="landing-description">
        <p><strong>${poses.length} established yoga poses</strong> specifically ordered and timed to stretch, strengthen, and warm the body.</p>
        <p>Ideally performed <strong>first thing daily on waking</strong> to prepare your body for the day ahead.</p>
        <p>Each pose is timed with audio cues so you can focus on your form. Adjustable multipliers let you <strong>scale any pose up or down</strong> to match your fitness level. Start easy and build over time.</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="showIntro()">View Routine</button>
      </div>
    </div>
  `;
  scaleApp();

  let imgIndex = 0;
  const imgEl = document.getElementById('landing-img');
  landingImageInterval = setInterval(() => {
    imgEl.classList.remove('fade-in');
    imgEl.classList.add('fade-out');
    setTimeout(() => {
      imgIndex = (imgIndex + 1) % poses.length;
      imgEl.src = poses[imgIndex].image;
      imgEl.classList.remove('fade-out');
      imgEl.classList.add('fade-in');
    }, 200);
  }, 3000);
}

function getRunCount() {
  return parseInt(localStorage.getItem('stretchTimerRunCount') || '0', 10);
}

function incrementRunCount() {
  localStorage.setItem('stretchTimerRunCount', (getRunCount() + 1).toString());
}

function renderDisclaimer() {
  app.innerHTML = `
    <div class="disclaimer">
      <h2>Disclaimer</h2>
      <div class="disclaimer-text">
        <p>While Rise &amp; Stretch was designed by a Registered Nurse with several years of yoga training using well-established yoga poses, this app is for <strong style="color:var(--text);">informational and educational purposes only</strong> and does not constitute medical advice.</p>
        <p>As with any physical activity, you assume full responsibility for ensuring all exercises are performed within your own physical limits. The author and publisher of Rise &amp; Stretch accept no liability for any injury, loss, or damage arising from use of this app.</p>
        <p>If you have any health concerns or medical conditions, <strong style="color:var(--text);">consult a licensed physician</strong> before beginning this or any exercise program.</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="acceptDisclaimer()">I Understand</button>
      </div>
      <div class="disclaimer-note">This notice is displayed every 30 sessions.</div>
    </div>
  `;
  scaleApp();
}

function acceptDisclaimer() {
  incrementRunCount();
  renderIntro();
}

function showIntro() {
  if (landingImageInterval) {
    clearInterval(landingImageInterval);
    landingImageInterval = null;
  }
  if (getRunCount() % 30 === 0) {
    renderDisclaimer();
  } else {
    incrementRunCount();
    renderIntro();
  }
}

function renderIntro() {
  const total = getTotalTime();
  let listHTML = poses.map((p, i) => {
    const mult = getMultiplier(p);
    const eff = getEffectiveDuration(p);
    return `
    <div class="pose-list-item">
      <span>${p.name}${p.side ? ' (' + p.side + ')' : ''}</span>
      <div class="pose-list-right">
        <button class="mult-btn ${mult <= 0.5 ? 'disabled' : ''}" onclick="adjustMultiplier(${i}, -0.1)">&minus;</button>
        <span class="mult-value">&times;${mult.toFixed(1)}</span>
        <button class="mult-btn" onclick="adjustMultiplier(${i}, 0.1)">+</button>
        <span class="pose-list-time">${eff}s</span>
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header"><h1>Rise &amp; Stretch</h1></div>
    <div class="intro">
      <h2>Daily Flexibility Routine</h2>
      <p>${poses.length} poses &middot; ${formatTime(total)} total</p>
      <div class="pose-list">${listHTML}</div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="startRoutine()">Begin Routine</button>
      </div>
    </div>
  `;
  scaleApp();
}

function renderPose() {
  const pose = poses[currentPose];
  const mult = getMultiplier(pose);
  const effDuration = getEffectiveDuration(pose);
  const pipsHTML = poses.map((_, i) => {
    let cls = 'progress-pip';
    if (i < currentPose) cls += ' done';
    else if (i === currentPose) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let ringTotal, isWarning, timerLabel;
  if (countingDown) {
    ringTotal = 5;
    isWarning = true;
    timerLabel = 'get ready';
  } else {
    ringTotal = effDuration;
    isWarning = timeRemaining <= 5 && timeRemaining > 0 && running;
    timerLabel = running ? 'seconds' : (timeRemaining === 0 ? 'done!' : 'ready');
  }
  const offset = CIRCUMFERENCE - (CIRCUMFERENCE * (timeRemaining / ringTotal));

  const showMultControls = !running && !countingDown;

  app.innerHTML = `
    <div class="header"><h1>Rise &amp; Stretch</h1></div>
    <div class="progress-track">${pipsHTML}</div>
    <div class="pose-hint">${routineHints[currentPose] || ''}</div>
    <div class="pose-card">
      <div class="pose-label">Pose ${currentPose + 1} of ${poses.length}</div>
      <div class="pose-name">${pose.name}</div>
      <div class="pose-subtitle">${pose.side || ''}</div>
      <div class="pose-illustration">
        <img src="${pose.image}" alt="${pose.name}${pose.side ? ' - ' + pose.side : ''}">
      </div>
      ${showMultControls ? `
      <div class="pose-multiplier">
        <button class="mult-btn ${mult <= 0.5 ? 'disabled' : ''}" onclick="adjustMultiplier(${currentPose}, -0.1)">&minus;</button>
        <span class="mult-label"><span style="color:var(--accent);font-weight:700;">${pose.duration}s</span> &times;${mult.toFixed(1)} = ${effDuration}s</span>
        <button class="mult-btn" onclick="adjustMultiplier(${currentPose}, 0.1)">+</button>
      </div>` : ''}
    </div>
    <div class="timer-container">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="timer-ring-track" cx="100" cy="100" r="88"/>
        <circle class="timer-ring-fill ${isWarning ? 'warning' : ''}" cx="100" cy="100" r="88"
          stroke-dasharray="${CIRCUMFERENCE}"
          stroke-dashoffset="${offset}"/>
      </svg>
      <div class="timer-display">
        <div class="timer-seconds">${timeRemaining}</div>
        <div class="timer-label">${timerLabel}</div>
      </div>
    </div>
    <div class="btn-row">
      ${!running && !countingDown && timeRemaining > 0
        ? (paused
          ? `<button class="btn btn-start" onclick="resumeTimer()">Resume</button>`
          : `<button class="btn btn-start" onclick="startTimer()">Start</button>`)
        : running || countingDown
          ? `<button class="btn btn-pause" onclick="pauseTimer()">Pause</button>`
          : `<button class="btn btn-start" onclick="nextPose()">Next Pose</button>`
      }
    </div>
    <div class="nav-bar">
      <button class="nav-btn ${currentPose === 0 ? 'disabled' : ''}" onclick="prevPose()"><span class="nav-icon">&#9664;</span> Prev</button>
      <button class="nav-btn" onclick="resetApp()"><span class="nav-icon">&#8962;</span> Home</button>
      <button class="nav-btn" onclick="redoPose()"><span class="nav-icon">&#8635;</span> Redo</button>
      <button class="nav-btn" onclick="nextPose()">Skip <span class="nav-icon">&#9654;</span></button>
    </div>
  `;
  scaleApp();
}

function renderComplete() {
  const total = getTotalTime();
  app.innerHTML = `
    <div class="header"><h1>Rise &amp; Stretch</h1></div>
    <div class="progress-track">${poses.map(() => '<div class="progress-pip done"></div>').join('')}</div>
    <div class="completed">
      <div class="total-time">${formatTime(total)}</div>
      <h2>All Done!</h2>
      <p>Great work finishing your flexibility routine.</p>
      <button class="btn btn-start" onclick="resetApp()">Do It Again</button>
      <div style="margin-top:32px;font-size:0.65rem;line-height:2;white-space:nowrap;">
        <p style="font-size:inherit;margin:0;">App Design by <a href="https://github.com/wolfdenpublishing/stretchtimer" target="_blank" rel="noopener" style="color:var(--accent);">Wolfden Publishing</a> &middot; MIT License</p>
        <p style="font-size:inherit;margin:0;">Created with the help of <a href="https://claude.com/claude-code" target="_blank" rel="noopener" style="color:var(--accent);">Anthropic Claude Code</a></p>
        <p style="font-size:inherit;margin:0;">Pose illustrations by <a href="https://www.freepik.com/author/brgfx" target="_blank" rel="noopener" style="color:var(--accent);">brgfx</a> on Freepik</p>
      </div>
    </div>
  `;
  scaleApp();
}

function startRoutine() {
  if (landingImageInterval) { clearInterval(landingImageInterval); landingImageInterval = null; }
  ensureAudio();
  shuffleHints();
  currentPose = 0;
  countingDown = false;
  paused = false;
  timeRemaining = getEffectiveDuration(poses[0]);
  running = false;
  renderPose();
}

function startTimer() {
  ensureAudio();
  countingDown = true;
  paused = false;
  running = true;
  timeRemaining = 5;
  renderPose();
  timerInterval = setInterval(countdownTick, 1000);
}

function countdownTick() {
  timeRemaining--;
  if (timeRemaining > 0) {
    playTick();
    renderPose();
  } else {
    clearInterval(timerInterval);
    playDing();
    countingDown = false;
    timeRemaining = getEffectiveDuration(poses[currentPose]);
    renderPose();
    timerInterval = setInterval(poseTimerTick, 1000);
  }
}

function poseTimerTick() {
  timeRemaining--;
  if (timeRemaining <= 5 && timeRemaining > 0) playTick();
  if (timeRemaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    running = false;
    playDing();
    renderPose();
  } else {
    renderPose();
  }
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  paused = true;
  renderPose();
}

function resumeTimer() {
  ensureAudio();
  running = true;
  paused = false;
  renderPose();
  timerInterval = setInterval(countingDown ? countdownTick : poseTimerTick, 1000);
}

function nextPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  currentPose++;
  if (currentPose >= poses.length) {
    renderComplete();
  } else {
    timeRemaining = getEffectiveDuration(poses[currentPose]);
    renderPose();
  }
}

function prevPose() {
  if (currentPose <= 0) return;
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  currentPose--;
  timeRemaining = getEffectiveDuration(poses[currentPose]);
  renderPose();
}

function redoPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  countingDown = false;
  paused = false;
  timeRemaining = getEffectiveDuration(poses[currentPose]);
  renderPose();
}

function resetApp() {
  currentPose = -1;
  timeRemaining = 0;
  running = false;
  countingDown = false;
  paused = false;
  clearInterval(timerInterval);
  renderLanding();
}

function scaleApp() {
  app.style.transform = 'none';
  const appW = app.offsetWidth;
  const appH = app.scrollHeight;
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  const scale = Math.min(winW / appW, winH / appH);
  app.style.transform = `scale(${scale})`;
}

window.addEventListener('resize', scaleApp);
document.fonts.ready.then(scaleApp);

renderLanding();
</script>
</body>
</html>
