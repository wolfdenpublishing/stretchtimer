<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stretch Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1923;
    --card: #172a3a;
    --card-border: #1e3a4f;
    --accent: #3ecfb4;
    --accent-glow: rgba(62, 207, 180, 0.15);
    --text: #e8f0f2;
    --text-dim: #7a9bae;
    --warning: #f0a050;
    --done: #50d890;
    --ring-track: #1e3a4f;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .progress-track {
    width: 100%;
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
  }
  .progress-pip {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--ring-track);
    transition: background 0.4s ease;
  }
  .progress-pip.done { background: var(--accent); }
  .progress-pip.active { background: var(--warning); }

  .pose-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px 20px 16px;
    width: 100%;
    text-align: center;
    position: relative;
    margin-bottom: 24px;
  }
  .pose-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pose-name {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.2;
  }
  .pose-subtitle {
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 12px;
    min-height: 1.3em;
  }

  .pose-illustration {
    width: 150px;
    height: 140px;
    margin: 0 auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    overflow: hidden;
  }
  .pose-illustration img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .timer-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 24px;
  }
  .timer-ring {
    transform: rotate(-90deg);
    width: 200px;
    height: 200px;
  }
  .timer-ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }
  .timer-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s ease;
    filter: drop-shadow(0 0 6px var(--accent-glow));
  }
  .timer-ring-fill.warning {
    stroke: var(--warning);
  }
  .timer-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .timer-seconds {
    font-family: 'Space Mono', monospace;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
  }
  .timer-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    padding: 16px 40px;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
    width: 100%;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(62, 207, 180, 0.25);
  }
  .btn-start:hover { box-shadow: 0 4px 30px rgba(62, 207, 180, 0.4); }

  .btn-pause {
    background: var(--card);
    color: var(--text);
    box-shadow: none;
    width: 100%;
    max-width: 280px;
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 100%;
    margin-top: 16px;
  }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text-dim);
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .nav-btn.disabled {
    opacity: 0.3;
    pointer-events: none;
  }
  .nav-icon {
    font-size: 1rem;
    line-height: 1;
  }

  .completed {
    text-align: center;
    padding: 40px 20px;
  }
  .completed h2 {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .completed p {
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 24px;
  }
  .completed .total-time {
    font-family: 'Space Mono', monospace;
    font-size: 2.4rem;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .intro {
    text-align: center;
    padding-top: 20px;
  }
  .intro h2 {
    font-size: 1.3rem;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .intro p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .pose-list {
    text-align: left;
    width: 100%;
    margin-bottom: 28px;
  }
  .pose-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--card-border);
    font-size: 0.95rem;
  }
  .pose-list-item:last-child { border-bottom: none; }
  .pose-list-time {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
  }
</style>
</head>

};

const poses = [
  { name: "Cat Pose", duration: 45, subtitle: "", key: "cat" },
  { name: "Cow Pose", duration: 45, subtitle: "", key: "cow" },
  { name: "One Legged Downward Dog", duration: 45, subtitle: "Right Leg", key: "oldd" },
  { name: "One Legged Downward Dog", duration: 45, subtitle: "Left Leg", key: "oldd" },
  { name: "Camel Pose", duration: 30, subtitle: "", key: "camel" },
  { name: "Forward Bend", duration: 30, subtitle: "", key: "forward" },
  { name: "Child Pose", duration: 30, subtitle: "", key: "child" },
  { name: "Seated Forward Bend", duration: 30, subtitle: "", key: "seated" },
  { name: "Upward Facing Dog", duration: 30, subtitle: "", key: "updog" },
  { name: "Downward Dog", duration: 30, subtitle: "", key: "downdog" },
];

const totalTime = poses.reduce((s, p) => s + p.duration, 0);

// Audio
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDing() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.8);
}

function playTick() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

// State
let currentPose = -1;
let timeRemaining = 0;
let timerInterval = null;
let running = false;

const app = document.getElementById('app');
const CIRCUMFERENCE = 2 * Math.PI * 88;

function renderIntro() {
  let listHTML = poses.map((p) => `
    <div class="pose-list-item">
      <span>${p.name}${p.subtitle ? ' (' + p.subtitle + ')' : ''}</span>
      <span class="pose-list-time">${p.duration}s</span>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="intro">
      <h2>Daily Flexibility Routine</h2>
      <p>${poses.length} poses &middot; ${Math.floor(totalTime / 60)}:${(totalTime % 60).toString().padStart(2, '0')} total</p>
      <div class="pose-list">${listHTML}</div>
      <div class="btn-row">
        <button class="btn btn-start" onclick="startRoutine()">Begin Routine</button>
      </div>
    </div>
  `;
}

function renderPose() {
  const pose = poses[currentPose];
  const pipsHTML = poses.map((_, i) => {
    let cls = 'progress-pip';
    if (i < currentPose) cls += ' done';
    else if (i === currentPose) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const offset = CIRCUMFERENCE - (CIRCUMFERENCE * (timeRemaining / pose.duration));
  const isWarning = timeRemaining <= 5 && timeRemaining > 0 && running;

  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="progress-track">${pipsHTML}</div>
    <div class="pose-card">
      <div class="pose-label">Pose ${currentPose + 1} of ${poses.length}</div>
      <div class="pose-name">${pose.name}</div>
      <div class="pose-subtitle">${pose.subtitle || ''}</div>
      <div class="pose-illustration">
        <img src="${poseImages[pose.key]}" alt="${pose.name}"/>
      </div>
    </div>
    <div class="timer-container">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="timer-ring-track" cx="100" cy="100" r="88"/>
        <circle class="timer-ring-fill ${isWarning ? 'warning' : ''}" cx="100" cy="100" r="88"
          stroke-dasharray="${CIRCUMFERENCE}"
          stroke-dashoffset="${offset}"/>
      </svg>
      <div class="timer-display">
        <div class="timer-seconds">${timeRemaining}</div>
        <div class="timer-label">${running ? 'seconds' : (timeRemaining === 0 ? 'done!' : 'ready')}</div>
      </div>
    </div>
    <div class="btn-row">
      ${!running && timeRemaining > 0
        ? `<button class="btn btn-start" onclick="startTimer()">Start</button>`
        : running
          ? `<button class="btn btn-pause" onclick="pauseTimer()">Pause</button>`
          : `<button class="btn btn-start" onclick="nextPose()">Next Pose</button>`
      }
    </div>
    <div class="nav-bar">
      <button class="nav-btn ${currentPose === 0 ? 'disabled' : ''}" onclick="prevPose()"><span class="nav-icon">&#9664;</span> Prev</button>
      <button class="nav-btn" onclick="resetApp()"><span class="nav-icon">&#8962;</span> Home</button>
      <button class="nav-btn" onclick="redoPose()"><span class="nav-icon">&#8635;</span> Redo</button>
      <button class="nav-btn" onclick="nextPose()">Skip <span class="nav-icon">&#9654;</span></button>
    </div>
  `;
}

function renderComplete() {
  app.innerHTML = `
    <div class="header"><h1>Stretch Timer</h1></div>
    <div class="progress-track">${poses.map(() => '<div class="progress-pip done"></div>').join('')}</div>
    <div class="completed">
      <div class="total-time">${Math.floor(totalTime / 60)}:${(totalTime % 60).toString().padStart(2, '0')}</div>
      <h2>All Done!</h2>
      <p>Great work finishing your flexibility routine.</p>
      <button class="btn btn-start" onclick="resetApp()">Do It Again</button>
    </div>
  `;
}

function startRoutine() {
  ensureAudio();
  currentPose = 0;
  timeRemaining = poses[0].duration;
  running = false;
  renderPose();
}

function startTimer() {
  ensureAudio();
  running = true;
  renderPose();
  timerInterval = setInterval(() => {
    timeRemaining--;
    if (timeRemaining <= 5 && timeRemaining > 0) playTick();
    if (timeRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      running = false;
      playDing();
      renderPose();
    } else {
      renderPose();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  renderPose();
}

function nextPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  currentPose++;
  if (currentPose >= poses.length) {
    renderComplete();
  } else {
    timeRemaining = poses[currentPose].duration;
    renderPose();
  }
}

function prevPose() {
  if (currentPose <= 0) return;
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  currentPose--;
  timeRemaining = poses[currentPose].duration;
  renderPose();
}

function redoPose() {
  clearInterval(timerInterval);
  timerInterval = null;
  running = false;
  timeRemaining = poses[currentPose].duration;
  renderPose();
}

function resetApp() {
  currentPose = -1;
  timeRemaining = 0;
  running = false;
  clearInterval(timerInterval);
  renderIntro();
}

renderIntro();
</script>
